<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notícias — IF Baiano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <!-- QR code library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      --green:   #00A859;
      --green-d: #007a40;
      --white:   #f5f5f0;
      --dim:     rgba(0,0,0,.55);
      --slide-duration: 9000;   /* ms per slide            */
      --anim-enter: 1000ms;     /* cross-fade in           */
      --anim-kb:    21s;        /* Ken-Burns duration      */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #050a05;
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
    }

    /* ── LOADER ─────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #050a05;
      z-index: 100;
      gap: 28px;
      transition: opacity .6s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    .loader-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 5vw, 4.5rem);
      letter-spacing: .18em;
      color: var(--green);
    }
    .loader-logo span { color: var(--white); }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,.12);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SLIDESHOW WRAPPER ───────────────────────────────── */
    #slideshow {
      position: relative;
      width: 100vw; height: 100vh;
    }

    /* ── SLIDE ───────────────────────────────────────────── */
    .slide {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity var(--anim-enter) ease;
      overflow: hidden;
    }
    .slide.active   { opacity: 1; z-index: 2; }
    .slide.previous { opacity: 0; z-index: 1; }

    /* background image */
    .slide-bg {
      position: absolute; inset: -6%;
      background-size: cover;
      background-position: center;
      filter: brightness(.72) saturate(1.08);
      will-change: transform;
    }
    .slide.active .slide-bg {
      animation: kenBurns var(--anim-kb) ease-out forwards;
    }
    @keyframes kenBurns {
      from { transform: scale(1.08) translateX(1%); }
      to   { transform: scale(1)    translateX(-1%); }
    }

    /* gradient overlays */
    .slide::after {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(to top,
          rgba(0,0,0,.92) 0%,
          rgba(0,0,0,.5)  38%,
          rgba(0,0,0,.18) 65%,
          transparent     100%),
        linear-gradient(to right,
          rgba(0,0,0,.4) 0%,
          transparent    55%);
    }

    /* ── CONTENT LAYER ───────────────────────────────────── */
    .slide-content {
      position: absolute; inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: clamp(32px, 5vw, 80px) clamp(32px, 6vw, 100px);
      /* leave room on the right for QR code panel */
      padding-right: clamp(200px, 22vw, 340px);
      padding-bottom: clamp(48px, 7vh, 90px);
    }

    .slide-category {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(.65rem, 1.1vw, .88rem);
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: clamp(14px, 2vh, 28px);
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .6s ease .3s, transform .6s ease .3s;
    }
    .slide-category::before {
      content: '';
      width: 28px; height: 2px;
      background: var(--green);
      flex-shrink: 0;
    }
    .slide.active .slide-category { opacity: 1; transform: translateY(0); }

    .slide-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5.2vw, 6.8rem);
      line-height: .96;
      letter-spacing: .02em;
      color: var(--white);
      max-width: 18ch;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .7s ease .5s, transform .7s ease .5s;
    }
    .slide.active .slide-title { opacity: 1; transform: translateY(0); }

    .slide-date {
      margin-top: clamp(14px, 2.5vh, 26px);
      font-size: clamp(.65rem, 1vw, .82rem);
      font-weight: 300;
      letter-spacing: .12em;
      color: rgba(245,245,240,.55);
      text-transform: uppercase;
      opacity: 0;
      transition: opacity .6s ease .75s;
    }
    .slide.active .slide-date { opacity: 1; }

    /* ── QR CODE PANEL ───────────────────────────────────── */
    .slide-qr {
      position: absolute;
      bottom: clamp(40px, 6vh, 80px);
      right: clamp(32px, 4vw, 72px);
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .6s ease 1s, transform .6s ease 1s;
    }
    .slide.active .slide-qr { opacity: 1; transform: translateY(0); }

    .slide-qr-frame {
      background: rgba(255,255,255,.96);
      border-radius: 10px;
      padding: 10px;
      box-shadow:
        0 4px 24px rgba(0,0,0,.45),
        0 0 0 1px rgba(255,255,255,.08);
    }

    /* QRCode lib renders a canvas or table inside; force consistent size */
    .slide-qr-frame canvas,
    .slide-qr-frame img {
      display: block;
      width: clamp(90px, 9vw, 140px) !important;
      height: clamp(90px, 9vw, 140px) !important;
    }

    .slide-qr-label {
      font-size: clamp(.5rem, .75vw, .68rem);
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(245,245,240,.55);
      text-align: center;
    }

    /* ── LOGO WATERMARK ──────────────────────────────────── */
    .brand {
      position: fixed;
      top: clamp(16px, 2.5vh, 40px);
      right: clamp(24px, 3.5vw, 60px);
      z-index: 10;
    }
    .brand img {
      height: clamp(52px, 7vw, 100px);
      width: auto;
      filter: brightness(0) invert(1) drop-shadow(0 2px 8px rgba(0,0,0,.5));
      opacity: .92;
    }

    /* ── PROGRESS BAR ────────────────────────────────────── */
    #progress-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 3px;
      background: var(--green);
      z-index: 10;
      width: 0%;
      transition: width linear;
    }

    /* ── DOTS ────────────────────────────────────────────── */
    #dots {
      position: fixed;
      bottom: clamp(18px, 3vh, 40px);
      right: clamp(24px, 3.5vw, 60px);
      z-index: 10;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.3);
      transition: background .4s, transform .4s;
    }
    .dot.active {
      background: var(--green);
      transform: scale(1.5);
    }

    /* ── CLOCK ───────────────────────────────────────────── */
    #clock {
      position: fixed;
      top: clamp(20px, 3vh, 48px);
      left: clamp(24px, 3.5vw, 60px);
      z-index: 10;
    }
    #clock-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 2.8vw, 2.8rem);
      letter-spacing: .1em;
      color: var(--white);
      line-height: 1;
    }
    #clock-date {
      font-size: clamp(.55rem, .9vw, .75rem);
      font-weight: 300;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(245,245,240,.5);
      margin-top: 4px;
    }

    /* ── SLIDE COUNTER ───────────────────────────────────── */
    #counter {
      position: fixed;
      bottom: clamp(18px, 3vh, 40px);
      left: clamp(24px, 3.5vw, 60px);
      z-index: 10;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 1.8vw, 1.8rem);
      letter-spacing: .1em;
      color: rgba(255,255,255,.35);
    }
    #counter span { color: var(--white); }

    /* ── ERROR STATE ─────────────────────────────────────── */
    #error-msg {
      display: none;
      position: fixed; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      z-index: 50;
      background: #050a05;
      text-align: center;
      padding: 32px;
    }
    #error-msg.visible { display: flex; }
    #error-msg h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: var(--green);
      letter-spacing: .12em;
    }
    #error-msg p { font-size: .9rem; color: rgba(255,255,255,.5); }
  </style>
</head>

<script>
(function () {
  "use strict";

  /* ── CONFIG ─────────────────────────────── */
  const API_URL        = "https://ifbaiano.edu.br/portal/wp-json/wp/v2/posts?per_page=10&_embed";
  const SLIDE_MS       = 20000;      // ← aumentado para 20 s por slide
  const REFRESH_MS     = 60 * 60 * 1000; // 60 min
  const FALLBACK_IMG   = "https://ifbaiano.edu.br/portal/wp-content/uploads/2026/04/7647-placeholder-if-baiano.webp";

  /* QR size in pixels (for the qrcode.js lib) */
  const QR_SIZE = Math.round(Math.min(window.innerWidth * 0.09, 140));

  /* ── STATE ──────────────────────────────── */
  let slides    = [];
  let current   = 0;
  let slideTimer;

  /* ── CLOCK ──────────────────────────────── */
  const DAYS   = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
  const MONTHS = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

  function tickClock () {
    const now = new Date();
    const hh  = String(now.getHours()).padStart(2,"0");
    const mm  = String(now.getMinutes()).padStart(2,"0");
    document.getElementById("clock-time").textContent = `${hh}:${mm}`;
    document.getElementById("clock-date").textContent =
      `${DAYS[now.getDay()]}, ${now.getDate()} de ${MONTHS[now.getMonth()]} de ${now.getFullYear()}`;
  }
  tickClock();
  setInterval(tickClock, 1000);

  /* ── UTILS ──────────────────────────────── */
  function decodeHTML (html) {
    const t = document.createElement("textarea");
    t.innerHTML = html;
    return t.value;
  }

  function formatDate (iso) {
    const d = new Date(iso);
    return d.toLocaleDateString("pt-BR", { day:"2-digit", month:"long", year:"numeric" });
  }

  function getImage (post) {
    try {
      const media = post._embedded?.["wp:featuredmedia"]?.[0];
      if (media?.source_url) return media.source_url;
      if (media?.media_details?.sizes?.large?.source_url) return media.media_details.sizes.large.source_url;
      if (media?.media_details?.sizes?.full?.source_url)  return media.media_details.sizes.full.source_url;
    } catch (_) {}
    return "";   // will fall back to FALLBACK_IMG
  }

  function getCategory (post) {
    try {
      return post._embedded?.["wp:term"]?.[0]?.[0]?.name ?? "Notícia";
    } catch (_) { return "Notícia"; }
  }

  /* ── FETCH ──────────────────────────────── */
  async function fetchNews () {
    const res = await fetch(API_URL, { cache: "no-cache" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  /* ── BUILD QR CODE ──────────────────────── */
  function buildQR (container, url) {
    /* qrcode.js fills the container synchronously */
    try {
      new QRCode(container, {
        text:         url,
        width:        QR_SIZE,
        height:       QR_SIZE,
        colorDark:    "#111111",
        colorLight:   "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch (e) {
      console.warn("QR generation failed:", e);
    }
  }

  /* ── BUILD SLIDES ───────────────────────── */
  function buildSlides (posts) {
    const container = document.getElementById("slideshow");
    const dotsEl    = document.getElementById("dots");
    container.innerHTML = "";
    dotsEl.innerHTML    = "";

    slides = posts.map((post, i) => {
      const rawImg  = getImage(post);
      const imgUrl  = rawImg || FALLBACK_IMG;   // ← fallback aplicado aqui
      const title   = decodeHTML(post.title?.rendered ?? "Sem título");
      const date    = formatDate(post.date);
      const cat     = getCategory(post);
      const postUrl = post.link ?? "";

      const slide = document.createElement("div");
      slide.className = "slide";

      slide.innerHTML = `
        <div class="slide-bg" style="background-image:url('${imgUrl}')"></div>
        <div class="slide-content">
          <div class="slide-category">${cat}</div>
          <h2 class="slide-title">${title}</h2>
          <div class="slide-date">${date}</div>
        </div>
        <div class="slide-qr">
          <div class="slide-qr-frame" id="qr-${i}"></div>
          <div class="slide-qr-label">Leia a notícia</div>
        </div>
      `;
      container.appendChild(slide);

      /* Generate QR after element is in the DOM */
      if (postUrl) {
        buildQR(slide.querySelector(`#qr-${i}`), postUrl);
      }

      /* dot */
      const dot = document.createElement("div");
      dot.className = "dot" + (i === 0 ? " active" : "");
      dotsEl.appendChild(dot);

      return slide;
    });

    document.getElementById("tot").textContent = slides.length;
  }

  /* ── PROGRESS BAR ───────────────────────── */
  function animateProgress () {
    const bar = document.getElementById("progress-bar");
    bar.style.transition = "none";
    bar.style.width      = "0%";
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        bar.style.transition = `width ${SLIDE_MS}ms linear`;
        bar.style.width      = "100%";
      });
    });
  }

  /* ── GO TO SLIDE ────────────────────────── */
  function goTo (index) {
    const prev = slides[current];
    prev?.classList.remove("active");
    prev?.classList.add("previous");
    setTimeout(() => prev?.classList.remove("previous"), 1100);

    current = (index + slides.length) % slides.length;

    const next = slides[current];
    next?.classList.add("active");

    /* update dots */
    document.querySelectorAll(".dot").forEach((d, i) =>
      d.classList.toggle("active", i === current)
    );

    /* update counter */
    document.getElementById("cur").textContent = current + 1;

    animateProgress();
  }

  /* ── AUTOPLAY ───────────────────────────── */
  function startAutoplay () {
    clearInterval(slideTimer);
    slideTimer = setInterval(() => goTo(current + 1), SLIDE_MS);
  }

  /* ── INIT ───────────────────────────────── */
  async function init () {
    const loader   = document.getElementById("loader");
    const errorMsg = document.getElementById("error-msg");

    try {
      errorMsg.classList.remove("visible");
      const posts = await fetchNews();
      if (!posts?.length) throw new Error("empty");

      buildSlides(posts);
      goTo(0);
      startAutoplay();

      loader.classList.add("hidden");
      setTimeout(() => loader.remove(), 700);

    } catch (err) {
      console.error("Erro ao carregar notícias:", err);
      loader.classList.add("hidden");
      errorMsg.classList.add("visible");

      /* retry in 30 s */
      setTimeout(init, 30_000);
    }
  }

  /* ── PERIODIC REFRESH ───────────────────── */
  setInterval(async () => {
    try {
      const posts = await fetchNews();
      if (!posts?.length) return;

      clearInterval(slideTimer);
      buildSlides(posts);
      current = -1;
      goTo(0);
      startAutoplay();
    } catch (_) { /* silently skip */ }
  }, REFRESH_MS);

  init();
})();
</script>
</body>
</html>
