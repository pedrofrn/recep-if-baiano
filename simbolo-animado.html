<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #264929;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 520px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #235826 0%, #103a13 70%);
      animation: bgPulse 3s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes bgPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: min(80vmin, 520px);
      height: min(60vmin, 400px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .scene-svg { animation: fadeScene1 9s infinite; }
    .scene-txt { animation: fadeScene2 9s infinite; }

    @keyframes fadeScene1 {
      0%, 61%   { opacity: 1; visibility: visible; transform: scale(1); }
      67%, 94%  { opacity: 0; visibility: hidden;  transform: scale(0.9); }
      100%      { opacity: 1; visibility: visible; transform: scale(1); }
    }

    @keyframes fadeScene2 {
      0%, 61%   { opacity: 0; visibility: hidden;  transform: scale(0.9); }
      67%, 94%  { opacity: 1; visibility: visible; transform: scale(1); }
      100%      { opacity: 0; visibility: hidden;  transform: scale(0.9); }
    }

    /* ── SÍMBOLO ── */
    .symbol-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      animation: sway 6s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-2.5deg) scale(1); }
      50%       { transform: rotate(2.5deg) scale(1.06); }
    }

    .green { fill: #359737; }
    .red   { fill: #c91517; }

    .circle, .sq1, .sq2, .sq3, .sq4,
    .sq5, .sq6, .sq7, .sq8, .sq9 {
      transform-box: fill-box;
      transform-origin: center;
    }

    @keyframes circlePulse {
      0%   { transform: scale(1);    filter: drop-shadow(0 0 6px #c91517); }
      35%  { transform: scale(1.35); filter: drop-shadow(0 0 28px #ff2222) drop-shadow(0 0 55px #ff000088); }
      55%  { transform: scale(0.82); filter: drop-shadow(0 0 6px #c91517); }
      75%  { transform: scale(1.15); filter: drop-shadow(0 0 18px #c91517); }
      100% { transform: scale(1);    filter: drop-shadow(0 0 6px #c91517); }
    }

    .circle { animation: circlePulse 2s cubic-bezier(.36,.07,.19,.97) infinite; }

    @keyframes squareWave {
      0%   { transform: scale(1)    translateY(0px);   filter: drop-shadow(0 0 3px #35973766); }
      22%  { transform: scale(1.22) translateY(-18px); filter: drop-shadow(0 0 28px #39c43bcc) brightness(1.5); }
      42%  { transform: scale(0.85) translateY(6px);   filter: drop-shadow(0 0 5px #359737); }
      62%  { transform: scale(1.08) translateY(-6px);  filter: drop-shadow(0 0 14px #35973799); }
      82%  { transform: scale(0.97) translateY(2px);   filter: drop-shadow(0 0 4px #35973755); }
      100% { transform: scale(1)    translateY(0px);   filter: drop-shadow(0 0 3px #35973766); }
    }

    .sq1 { animation: squareWave 1.98s ease-in-out 0.00s infinite; }
    .sq2 { animation: squareWave 1.98s ease-in-out 0.22s infinite; }
    .sq3 { animation: squareWave 1.98s ease-in-out 0.44s infinite; }
    .sq4 { animation: squareWave 1.98s ease-in-out 0.66s infinite; }
    .sq5 { animation: squareWave 1.98s ease-in-out 0.88s infinite; }
    .sq6 { animation: squareWave 1.98s ease-in-out 1.10s infinite; }
    .sq7 { animation: squareWave 1.98s ease-in-out 1.32s infinite; }
    .sq8 { animation: squareWave 1.98s ease-in-out 1.54s infinite; }
    .sq9 { animation: squareWave 1.98s ease-in-out 1.76s infinite; }

    /* ── LETREIRO SVG ── */
    .text-svg {
      width: 95%;
      max-width: 500px;
      height: auto;
      overflow: visible;
    }

    /* Flutuação geral */
    @keyframes floatText {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%      { transform: translateY(-10px) scale(1.02); }
    }

    .text-svg { animation: floatText 3s ease-in-out infinite; }

    /* Barra vermelha: escorrega da esquerda */
    .bar-red {
      transform-origin: left center;
      animation: barSlide 1.4s cubic-bezier(.22,.68,0,1.2) forwards;
      transform: scaleX(0);
    }

    @keyframes barSlide {
      0%   { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }

    /* Letras brancas: cada grupo aparece escorregando para cima com delay escalonado */
    .letter-group {
      opacity: 0;
      animation: letterRise 0.5s ease-out forwards;
    }

    @keyframes letterRise {
      0%   { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Brilho varrendo o letreiro */
    @keyframes sheen {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }

    .sheen-rect {
      animation: sheen 2.8s ease-in-out infinite;
      transform-origin: center;
    }

    /* Pulso suave no letreiro inteiro via filtro */
    @keyframes glowPulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(255,255,255,0.15)); }
      50%       { filter: drop-shadow(0 0 14px rgba(255,255,255,0.45)); }
    }

    .text-svg { animation: floatText 3s ease-in-out infinite, glowPulse 2.6s ease-in-out infinite; }

  </style>
</head>

  <script>
    // Reativa as animações de entrada toda vez que o letreiro fica visível
    const sceneTxt = document.querySelector('.scene-txt');
    const letterGroups = document.querySelectorAll('.letter-group');
    const barRed = document.querySelector('.bar-red');

    function resetEntryAnimations() {
      barRed.style.animation = 'none';
      letterGroups.forEach(g => { g.style.animation = 'none'; });
      void barRed.offsetWidth;
      barRed.style.animation = '';
      letterGroups.forEach(g => { g.style.animation = ''; });
    }

    // Ciclo: cada 9s, na marca de ~5.5s o letreiro aparece
    // Reinicia as animações de entrada a cada ciclo
    setInterval(resetEntryAnimations, 9000);
  </script>
